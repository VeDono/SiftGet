<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="120" y1="0" x2="392" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#463857"/>
      <stop offset="0.46" stop-color="#2C2239"/>
      <stop offset="1" stop-color="#1D1526"/>
    </linearGradient>
    <linearGradient id="cardFront" x1="150" y1="150" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9C468"/>
      <stop offset="0.55" stop-color="#E7A23A"/>
      <stop offset="1" stop-color="#D98F27"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="150" y1="150" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C4842B"/>
      <stop offset="1" stop-color="#9E6A1E"/>
    </linearGradient>
    <linearGradient id="cardMid" x1="150" y1="150" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DD9E3E"/>
      <stop offset="1" stop-color="#B87C24"/>
    </linearGradient>
    <linearGradient id="gloss" x1="256" y1="12" x2="256" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="tileClip">
      <rect x="0" y="0" width="512" height="512" rx="116"/>
    </clipPath>
  </defs>

  <!-- cabinet tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- fanned deck of videos -->
  <g clip-path="url(#tileClip)">
    <g transform="rotate(-13 256 256) translate(-40 24)">
      <rect x="140" y="140" width="232" height="232" rx="56" fill="url(#cardBack)"/>
    </g>
    <g transform="rotate(11 256 256) translate(40 -16)">
      <rect x="140" y="140" width="232" height="232" rx="56" fill="url(#cardMid)"/>
    </g>
    <rect x="140" y="140" width="232" height="232" rx="56" fill="url(#cardFront)"/>
    <!-- play button on the front card -->
    <path d="M222 196 L222 316 L318 256 Z" fill="#2A1F36"/>
  </g>

  <!-- top gloss + rim -->
  <rect x="36" y="10" width="440" height="236" rx="104" fill="url(#gloss)" clip-path="url(#tileClip)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="3"/>
</svg>
